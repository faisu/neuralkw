<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg-doc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="stroke-doc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="check-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="50%" stop-color="#059669" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="neural-line-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="brand-accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250" stroke="#FFFFFF" stroke-width="1" />
    <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300 M 600,0 L 600,300 M 700,0 L 700,300" stroke="#FFFFFF" stroke-width="1" />
  </g>
  <g transform="translate(10, 0)">
    <rect x="90" y="70" width="120" height="160" rx="16" fill="url(#bg-doc-grad)" stroke="url(#stroke-doc-grad)" stroke-width="2" />
    <path d="M 186,70 L 210,94 L 198,94 C 191.4,94 186,88.6 186,82 Z" fill="#38BDF8" opacity="0.4" />
    <line x1="115" y1="110" x2="165" y2="110" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" opacity="0.25" />
    <line x1="115" y1="130" x2="185" y2="130" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" opacity="0.25" />
    <line x1="115" y1="150" x2="155" y2="150" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" opacity="0.25" />
    <path d="M 75,150 L 115,110" stroke="url(#neural-line-grad)" stroke-width="2" stroke-dasharray="3,3" opacity="0.7" />
    <path d="M 115,110 L 150,185" stroke="url(#neural-line-grad)" stroke-width="2.5" opacity="0.6" />
    <path d="M 150,185 L 225,110" stroke="url(#neural-line-grad)" stroke-width="2.5" opacity="0.6" />
    <path d="M 225,110 L 245,140" stroke="url(#neural-line-grad)" stroke-width="2" stroke-dasharray="3,3" opacity="0.7" />
    <path d="M 150,185 L 150,225" stroke="url(#neural-line-grad)" stroke-width="2" opacity="0.5" />
    <path d="M 115,110 L 75,90" stroke="url(#neural-line-grad)" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.5" />
    <circle cx="75" cy="150" r="4" fill="#60A5FA" filter="url(#glow-soft)" />
    <circle cx="115" cy="110" r="6" fill="url(#node-grad)" filter="url(#glow-soft)" stroke="#10B981" stroke-width="1.5" />
    <circle cx="150" cy="185" r="7" fill="url(#node-grad)" filter="url(#glow-soft)" stroke="#10B981" stroke-width="2" />
    <circle cx="225" cy="110" r="6" fill="url(#node-grad)" filter="url(#glow-soft)" stroke="#10B981" stroke-width="1.5" />
    <circle cx="245" cy="140" r="4" fill="#06B6D4" filter="url(#glow-soft)" />
    <circle cx="150" cy="225" r="4" fill="#38BDF8" filter="url(#glow-soft)" />
    <path d="M 115,145 L 150,180 L 215,115" fill="none" stroke="url(#check-grad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <path d="M 115,145 L 150,180 L 215,115" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
  </g>
  <text x="275" y="155" font-family="'Plus Jakarta Sans', sans-serif" font-size="56" font-weight="800" fill="#FFFFFF" letter-spacing="-1px">
    neural<tspan fill="url(#brand-accent-grad)">kw</tspan>
  </text>
  <text x="278" y="188" font-family="'Plus Jakarta Sans', sans-serif" font-size="12.5" font-weight="700" fill="#94A3B8" letter-spacing="3.5px" opacity="0.9">
    AGENTIC BILL RECONCILIATION
  </text>
  <rect x="585" y="115" width="36" height="20" rx="6" fill="#1E293B" stroke="#06B6D4" stroke-width="1" opacity="0.8" />
  <text x="603" y="129" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="800" fill="#06B6D4" text-anchor="middle">AI</text>
</svg>
